<!DOCTYPE html>
<html lang="eng">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta charset="utf-8" />
    <title>Quita - Give your worries a place to rest</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/authentication.css">
</head>
<body>
    <div class="login-sign-up">
        
        <!-- Secção do Logótipo -->
        <div class="frame">
            <img class="quita-final-logo" src="../assets/Quita Logo svg.svg" alt="Logótipo Quita" />
            <p class="text-wrapper">Give your worries a place to rest</p>
        </div>
        
        <!-- Secção de Autenticação -->
        <div class="div">
            <button class="liquid-glass-regular" data-navigate="./signupLogin.html">
                <div class="glass-effect"></div>
                <div class="text-wrapper-2">Create an account</div>
            </button>
            
            <button class="button-liquid-glass" data-navigate="./signupLogin.html?view=login">
                <div class="BG">
                    <div class="glass-effect-2"></div>
                </div>
                <div class="text">
                    <div class="symbol">Log in</div>
                </div>
            </button>
        </div>
        
        <div class="separator"></div>
        
        <!-- Secção Alerta / Fast Entry -->
        <div class="alert">
            <div class="glass-effect-wrapper">
                <div class="glass-effect-3"></div>
            </div>
            <div class="frame-2">
                <div class="div-wrapper">
                    <div class="vector-wrapper">
                        <img class="vector" src="../assets/raio.svg" alt="Ícone de Raio" />
                    </div>
                </div>
                <div class="title-and">
                    <h2 class="text-wrapper-3">Need immediate relief?</h2>
                    <p class="p">To start releasing worries right away</p>
                </div>
            </div>
            
            <button class="button-liquid-glass" data-navigate="./signupLogin.html">
                <div class="BG-2">
                    <div class="glass-effect-2"></div>
                </div>
                <div class="text">
                    <div class="symbol-2">Try fast entry</div>
                </div>
            </button>
        </div>
    </div>
    <script type="module" src="../views/authenticationView.js"></script>
    
</body>
</html>
