<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta charset="utf-8" />
    <title>Quita - Give your worries a place to rest</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/authentication.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-hero">
            <img class="auth-logo" src="../assets/Quita Logo svg.svg" alt="Logótipo Quita" />
            <p class="auth-tagline">Give your worries a place to rest</p>
        </div>
        
        <!-- Botões principais -->
    <div class="auth-actions">
      <button class="glass-chip auth-btn-primary" type="button" data-navigate="./signupLogin.html">
        Create an account
        </button>
        
            <button class="glass-chip" type="button" data-navigate="./signupLogin.html?view=login"
                style="--glass-chip-width: 100%">
                Log in
            </button>
        </div>
        
        <div class="auth-separator"></div>
        
        <!-- Card Fast Entry -->
    <div class="auth-alert">
      <div class="auth-alert-header">
        <div class="auth-alert-icon">
          <img src="../assets/raio.svg" alt="" aria-hidden="true" />
        </div>
        
        <div class="auth-alert-copy">
          <h2>Need immediate relief?</h2>
          <p>To start releasing worries right away</p>
        </div>
            </div>
            
        <button class="glass-chip auth-btn-fast-entry" type="button" data-navigate="./home.html">
            Try fast entry
        </button>
        </div>
    </div>
    <script type="module" src="../views/authenticationView.js"></script>
    
</body>
</html>
