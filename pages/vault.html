<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quita - Vault</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages/vault.css" />
</head>
<body>
  <main class="vault-page is-grid">
    <section class="vault-empty" data-vault-empty hidden>
      <div class="vault-empty-doll">
        <img src="../assets/doll-vault.png" alt="" aria-hidden="true" />
      </div>
      <div class="vault-empty-copy">
        <h2>Your vault is quiet</h2>
        <p>When something weighs on you,<br />place it here.</p>
      </div>
      <a class="vault-primary-button" href="./home.html">Add a guardian</a>
    </section>

    <section class="vault-grid-view" data-vault-grid hidden aria-label="Quita cards grid">
      <div class="vault-grid-track" data-vault-grid-list></div>
    </section>

    <section class="vault-list-view" data-vault-list hidden aria-label="Quita list">
      <header class="vault-list-header">
        <div>
          <h1>Vault</h1>
          <p>Held with care</p>
        </div>
      </header>

      <div class="vault-filter-row" aria-label="Worry type filters">
        <button class="glass-chip vault-filter is-selected" type="button" data-vault-filter="all" aria-pressed="true">All</button>
        <button class="glass-chip vault-filter" type="button" data-vault-filter="seed" aria-pressed="false">Seed</button>
        <button class="glass-chip vault-filter" type="button" data-vault-filter="knot" aria-pressed="false">Knot</button>
        <button class="glass-chip vault-filter" type="button" data-vault-filter="burden" aria-pressed="false">Burden</button>
      </div>

      <div class="vault-list-stack" data-vault-list-stack></div>
    </section>

    <div class="vault-view-toggle vault-view-toggle--floating" aria-label="Vault view">
      <button class="vault-toggle-button" type="button" data-vault-view="list" aria-label="List view">
        <span class="vault-toggle-icon vault-toggle-icon--list" aria-hidden="true"></span>
      </button>
      <button class="vault-toggle-button is-selected" type="button" data-vault-view="grid" aria-label="Grid view">
        <span class="vault-toggle-icon vault-toggle-icon--grid" aria-hidden="true"></span>
      </button>
    </div>

    <div class="vault-tools-overlay" data-vault-tools-overlay hidden>
      <div class="vault-tools-backdrop" data-vault-tools-close></div>
      <section class="vault-tools-sheet" aria-modal="true" aria-labelledby="vault-tools-title" role="dialog">
        <div class="vault-tools-handle" aria-hidden="true"></div>
        <div class="vault-tools-content" data-vault-tools-content></div>
        <button class="vault-tools-done" type="button" data-vault-tools-close>Done</button>
        <p class="vault-tools-support">If you are in crisis, get professional support <a href="#" aria-label="Professional support resources">here</a></p>
      </section>
    </div>

    <div class="vault-confirm-overlay" data-vault-confirm-overlay hidden>
      <div class="vault-confirm-backdrop" data-vault-confirm-no></div>
      <section class="vault-confirm-sheet" aria-modal="true" aria-labelledby="vault-confirm-title" role="dialog">
        <div class="vault-confirm-handle" aria-hidden="true"></div>
        <h2 class="vault-confirm-title" id="vault-confirm-title" data-vault-confirm-title></h2>
        <div class="vault-confirm-actions">
          <button class="vault-confirm-button vault-confirm-button--yes" type="button" data-vault-confirm-yes>Yes</button>
          <button class="vault-confirm-button vault-confirm-button--no" type="button" data-vault-confirm-no>No</button>
        </div>
      </section>
    </div>

    <nav class="app-bottom-nav" aria-label="Main navigation">
      <a class="app-bottom-nav__item app-bottom-nav__item--tools" href="./calmingTools.html">
        <span class="app-bottom-nav__icon" aria-hidden="true"></span>
        <span>Tools</span>
      </a>
      <a class="app-bottom-nav__item app-bottom-nav__item--vault" href="./vault.html?view=list" aria-current="page">
        <span class="app-bottom-nav__icon" aria-hidden="true"></span>
        <span>Vault</span>
      </a>
      <a class="app-bottom-nav__item app-bottom-nav__item--home" href="./home.html">
        <span class="app-bottom-nav__icon" aria-hidden="true"></span>
        <span>Home</span>
      </a>
      <a class="app-bottom-nav__item app-bottom-nav__item--bliss" aria-disabled="true">
        <span class="app-bottom-nav__icon" aria-hidden="true"></span>
        <span>Bliss</span>
      </a>
      <a class="app-bottom-nav__item app-bottom-nav__item--profile" href="./profile.html">
        <span class="app-bottom-nav__icon" aria-hidden="true"></span>
        <span>Profile</span>
      </a>
    </nav>

  </main>

  <script type="module" src="../views/vaultView.js"></script>
</body>
</html>
