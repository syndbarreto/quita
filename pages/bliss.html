<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quita - Bliss</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/bliss.css">
  <script src="/js/suppress-transition-errors.js"></script>
</head>
<body>
  <main class="bliss-page">

    <section class="bliss-stage" aria-labelledby="bliss-title">
      <img class="bliss-sun" src="../assets/Sun.svg" alt="" aria-hidden="true">
      <span class="bliss-decoration bliss-decoration--pentagon bliss-decoration--top-left" aria-hidden="true"></span>
      <span class="bliss-decoration bliss-decoration--diamond bliss-decoration--top-right" aria-hidden="true"></span>
      <span class="bliss-decoration bliss-decoration--star-blue" aria-hidden="true"></span>
      <span class="bliss-decoration bliss-decoration--star-mint" aria-hidden="true"></span>

      <header class="bliss-hero-copy">
        <h1 id="bliss-title">Bliss</h1>
        <p data-bliss-subtitle>They rest here now.</p>
        <span class="bliss-count-chip" data-bliss-count>0 LET GO</span>
      </header>

      <section class="bliss-empty" data-bliss-empty hidden>
        <p>No Quitas are resting here yet.</p>
      </section>

      <section class="bliss-carousel" aria-label="Released Quitas" data-bliss-carousel></section>
    </section>

    <section class="bliss-info-overlay" data-bliss-info-overlay hidden>
      <div class="bliss-info-backdrop" data-bliss-info-close></div>
      <article class="bliss-info-sheet" role="dialog" aria-modal="true" aria-labelledby="bliss-info-name">
        <button class="bliss-info-close" type="button" data-bliss-info-close aria-label="Close Bliss details">
          <img src="../assets/close.svg" alt="" aria-hidden="true">
        </button>
        <img class="bliss-info-doll" data-bliss-info-doll src="../assets/dolls/flower-happy.png" alt="">
        <p class="bliss-info-kicker" data-bliss-info-kicker>LET GO</p>
        <h2 id="bliss-info-name" class="bliss-info-name" data-bliss-info-name></h2>

        <section class="bliss-info-card" aria-labelledby="bliss-info-worry-title">
          <h3 id="bliss-info-worry-title">The worry</h3>
          <p data-bliss-info-worry></p>
        </section>

        <section class="bliss-info-card bliss-info-card--light" aria-labelledby="bliss-info-reflection-title">
          <h3 id="bliss-info-reflection-title">How it eased</h3>
          <p data-bliss-info-reflection></p>
        </section>
      </article>
    </section>
  </main>

  <nav class="app-bottom-nav" aria-label="Main navigation">
    <a class="app-bottom-nav__item app-bottom-nav__item--tools" href="./calmingTools.html">
      <span class="app-bottom-nav__icon" aria-hidden="true"></span>
      <span>Tools</span>
    </a>
    <a class="app-bottom-nav__item app-bottom-nav__item--vault" href="./vault.html?view=list">
      <span class="app-bottom-nav__icon" aria-hidden="true"></span>
      <span>Vault</span>
    </a>
    <a class="app-bottom-nav__item app-bottom-nav__item--home" href="./home.html">
      <span class="app-bottom-nav__icon" aria-hidden="true"></span>
      <span>Home</span>
    </a>
    <a class="app-bottom-nav__item app-bottom-nav__item--bliss" href="./bliss.html" aria-current="page">
      <span class="app-bottom-nav__icon" aria-hidden="true"></span>
      <span>Bliss</span>
    </a>
    <a class="app-bottom-nav__item app-bottom-nav__item--profile" href="./profile.html">
      <span class="app-bottom-nav__icon" aria-hidden="true"></span>
      <span>Profile</span>
    </a>
  </nav>

  <div class="guest-wall" data-guest-wall hidden>
    <div class="guest-wall-backdrop"></div>
    <div class="guest-wall-sheet">
      <div class="guest-wall-handle"></div>
      <img class="guest-wall-doll" src="../assets/Quita Logo svg.svg" alt="Quita" />
      <h2 class="guest-wall-title">See your released worries</h2>
      <p class="guest-wall-body">Create a free account to see all the worries you've let go of.</p>
      <a class="guest-wall-cta" href="./signupLogin.html">Create an account</a>
      <a class="guest-wall-login" href="./signupLogin.html?view=login">Already have an account? Log in</a>
    </div>
  </div>

  <script type="module" src="../views/blissView.js"></script>
</body>
</html>
