
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quita - Calming Tools</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/calmingTools.css">
  <script src="../js/suppress-transition-errors.js"></script>
</head>
<body>
    <main class="calming-tools-page" id="calmingToolPage">
        <!-- Header -->
        <header class="calming-header">
            <h1 class="calming-title">Calming Tools</h1>
            <button class="search-button" type="button" data-open-search>
                <img src="../assets/lupa.svg" alt="Search">
            </button>
        </header>

        <!-- Add Tools Horizontal Scroll -->
        <div class="add-tools-container">
            <div class="add-tools-scroll" id="addToolsScroll">
            </div>
        </div>

        <!-- Tools Gallery -->
        <div class="tools-gallery">
            <!-- Breathing -->
            <button class="tool-card" type="button" data-open-category="breathing">
                <img src="../assets/Breathing.svg" alt="Breathing">
            </button>

            <!-- Quotes -->
            <button class="tool-card" type="button" data-open-category="quotes">
                <img src="../assets/quotes.svg" alt="Quotes">
            </button>

            <!-- Grounding -->
            <button class="tool-card" type="button" data-open-category="grounding">
                <img src="../assets/Grounding.svg" alt="Grounding">
            </button>

            <!-- Sounds -->
            <button class="tool-card" type="button" data-open-category="sounds">
                <img src="../assets/Sounds.svg" alt="Sounds">
            </button>
        </div>
    </main>

    <!-- Search View -->
    <main class="search-view" id="searchView" hidden>
        <!-- Header / Search Bar -->
        <div class="search-header-bar">
            <button class="search-back-btn" type="button" data-close-search>
                <img src="../assets/arrow.svg" alt="Back">
            </button>
            <input class="search-input-wrapper" type="text" placeholder="Search Calming Tools">
        </div>

        <!-- Filters -->
        <div class="search-filters-container">
            <button class="filter-chip active" type="button" data-filter-category="all">
                <span class="chip-text">All</span>
            </button>
            <button class="filter-chip" type="button" data-filter-category="quotes">
                <span class="chip-text">Quotes</span>
            </button>
            <button class="filter-chip" type="button" data-filter-category="breathing">
                <span class="chip-text">Breathing</span>
            </button>
            <button class="filter-chip" type="button" data-filter-category="grounding">
                <span class="chip-text">Grounding</span>
            </button>
            <button class="filter-chip" type="button" data-filter-category="sounds">
                <span class="chip-text">Sounds</span>
            </button>
        </div>

        <!-- Results List -->
        <div class="search-results-list" id="searchResultsList">
            
        </div>

    </main>

    <!-- Category View -->
    <main class="search-view category-view" id="categoryView" hidden>
        <div class="category-header">
            <button class="search-back-btn" type="button" data-close-category>
                <img src="../assets/arrow.svg" alt="Back">
            </button>
            <h1 class="category-title" data-category-title></h1>
        </div>

        <section class="category-content">
            <img class="category-hero-image" src="" alt="" data-category-image>
            <div class="category-results-list" id="categoryResultsList"></div>
        </section>
    </main>

    <!-- Saved/Favorite Tools View -->
    <main class="search-view saved-tools-view" id="savedToolsView" hidden>
        <!-- Header / Search Bar -->
        <div class="search-header-bar">
            <button class="search-back-btn" type="button" data-close-saved>
                <img src="../assets/arrow.svg" alt="Back">
                <span>Back</span>
            </button>
            <input class="search-input-wrapper" type="text" placeholder="Search Calming Tools">
        </div>

        <div class="search-filters-container">
            <button class="filter-chip active" type="button" data-filter-category="all"><span class="chip-text">All</span></button>
            <button class="filter-chip" type="button" data-filter-category="quotes"><span class="chip-text">Quotes</span></button>
            <button class="filter-chip" type="button" data-filter-category="breathing"><span class="chip-text">Breathing</span></button>
            <button class="filter-chip" type="button" data-filter-category="grounding"><span class="chip-text">Grounding</span></button>
            <button class="filter-chip" type="button" data-filter-category="sounds"><span class="chip-text">Sounds</span></button>
        </div>

        <!-- Results List -->
        <div class="search-results-list" id="favsResultsList">
            
        </div>

        <button class="done-button-container" type="button" data-close-saved>
            <span class="done-button-text">Done</span>
        </button>
    </main>

    <!-- Tool Detail View -->
    <main class="search-view tool-detail-view" id="toolDetailView" hidden>
        <div class="tool-detail-header">
            <button class="search-back-btn" type="button" data-close-detail>
                <img src="../assets/arrow.svg" alt="Back">
            </button>
            <button class="favorite-btn tool-detail-favorite" type="button" data-detail-favorite>
            </button>
        </div>

        <section class="tool-detail-content" id="toolDetailContent">
        </section>
    </main>

    <main class="grounding-exercise-view" id="groundingExerciseView" hidden>
        <section class="grounding-exercise-content" id="groundingExerciseContent"></section>
    </main>

    <nav class="app-bottom-nav" aria-label="Main navigation">
        <a class="app-bottom-nav__item app-bottom-nav__item--tools" href="./calmingTools.html" aria-current="page">
            <span class="app-bottom-nav__icon" aria-hidden="true"></span>
            <span>Tools</span>
        </a>
        <a class="app-bottom-nav__item app-bottom-nav__item--vault" href="./vault.html?view=list">
            <span class="app-bottom-nav__icon" aria-hidden="true"></span>
            <span>Vault</span>
        </a>
        <a class="app-bottom-nav__item app-bottom-nav__item--home" href="./home.html">
            <span class="app-bottom-nav__icon" aria-hidden="true"></span>
            <span>Home</span>
        </a>
        <a class="app-bottom-nav__item app-bottom-nav__item--bliss" href="./bliss.html">
            <span class="app-bottom-nav__icon" aria-hidden="true"></span>
            <span>Bliss</span>
        </a>
        <a class="app-bottom-nav__item app-bottom-nav__item--profile" href="./profile.html">
            <span class="app-bottom-nav__icon" aria-hidden="true"></span>
            <span>Profile</span>
        </a>
    </nav>

    <div class="guest-wall" data-guest-wall hidden>
      <div class="guest-wall-backdrop"></div>
      <div class="guest-wall-sheet">
        <div class="guest-wall-handle"></div>
        <img class="guest-wall-doll" src="../assets/Quita Logo svg.svg" alt="Quita" />
        <h2 class="guest-wall-title">Keep going</h2>
        <p class="guest-wall-body">Create a free account to save favourites and access all tools anytime.</p>
        <a class="guest-wall-cta" href="./signupLogin.html">Create an account</a>
        <a class="guest-wall-login" href="./signupLogin.html?view=login">Already have an account? Log in</a>
      </div>
    </div>

    <script src="../views/calmingToolsView.js" type="module"></script>
</body>
</html>
