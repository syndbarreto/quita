<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quita - Home</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/home.css">
</head>
<body>
    <div class="home-container">
        <!-- Header -->
        <section class="home-greeting">
            <h1 class="greeting-title" data-user-greeting>Hi there</h1>
            <p class="greeting-subtitle">Tell your worries to the dolls, so<br/>they can worry for you.</p>
        </section>

        <!-- Doll Illustration -->
        <a class="doll-wrapper" href="./quiz.html" aria-label="Start the Quita quiz">
            <img class="doll-image" src="../assets/boneca_homepage.svg" alt="Doll illustration">
        </a>

        <!-- Emotional Check-in Section -->
        <section class="feeling-section">
            <h2 class="feeling-title">How are you feeling?</h2>
            
            <div class="emotion-card">
                <div class="card-background"></div>
                
                <div class="card-content">
                    <div class="emotion-icon-wrapper">
                        <img class="emotion-icon" src="../assets/coração.svg" alt="Emotion icon">
                    </div>
                    
                    <div class="emotion-text">
                        <h3 class="emotion-title">Emotional check-in</h3>
                        <p class="emotion-description">Describe how are you feeling <br/>today in one word.</p>
                    </div>
                </div>
                
                <div class="card-actions">
                    <a class="action-button action-button--secondary" href="./emotional-checkin.html">Begin</a>
                    <button class="action-button action-button--primary">History</button>
                </div>
            </div>
        </section>

    </div>

    <nav class="app-bottom-nav" aria-label="Main navigation">
        <a class="app-bottom-nav__item app-bottom-nav__item--tools" href="./calmingTools.html">
            <span class="app-bottom-nav__icon" aria-hidden="true"></span>
            <span>Tools</span>
        </a>
        <a class="app-bottom-nav__item app-bottom-nav__item--vault" href="./vault.html?view=list">
            <span class="app-bottom-nav__icon" aria-hidden="true"></span>
            <span>Vault</span>
        </a>
        <a class="app-bottom-nav__item app-bottom-nav__item--home" href="./home.html" aria-current="page">
            <span class="app-bottom-nav__icon" aria-hidden="true"></span>
            <span>Home</span>
        </a>
        <a class="app-bottom-nav__item app-bottom-nav__item--bliss" aria-disabled="true">
            <span class="app-bottom-nav__icon" aria-hidden="true"></span>
            <span>Bliss</span>
        </a>
        <a class="app-bottom-nav__item app-bottom-nav__item--profile" aria-disabled="true">
            <span class="app-bottom-nav__icon" aria-hidden="true"></span>
            <span>Profile</span>
        </a>
    </nav>

    <script type="module" src="../views/homeView.js"></script>
</body>
</html>
