<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quita - Release Reflection</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages/release-reflection.css" />
</head>
<body>
  <main class="release-reflection-page">
    <span class="release-shape release-shape--x shape-a" aria-hidden="true"></span>
    <span class="release-shape release-shape--burst shape-b" aria-hidden="true"></span>
    <span class="release-shape release-shape--burst shape-c" aria-hidden="true"></span>
    <span class="release-shape release-shape--x shape-d" aria-hidden="true"></span>
    <span class="release-shape release-shape--burst shape-e" aria-hidden="true"></span>
    <span class="release-shape release-shape--diamond shape-f" aria-hidden="true"></span>
    <span class="release-shape release-shape--burst shape-g" aria-hidden="true"></span>

    <header class="release-header">
      <a class="release-back-link" href="./vault.html?view=list" aria-label="Back to Vault">
        <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15.5307 18.9694C15.6004 19.0391 15.6557 19.1218 15.6934 19.2128C15.7311 19.3039 15.7505 19.4015 15.7505 19.5C15.7505 19.5985 15.7311 19.6961 15.6934 19.7872C15.6557 19.8782 15.6004 19.9609 15.5307 20.0306C15.461 20.1003 15.3783 20.1556 15.2873 20.1933C15.1962 20.231 15.0986 20.2504 15.0001 20.2504C14.9016 20.2504 14.804 20.231 14.7129 20.1933C14.6219 20.1556 14.5392 20.1003 14.4695 20.0306L6.96948 12.5306C6.89974 12.461 6.84443 12.3783 6.80668 12.2872C6.76894 12.1962 6.74951 12.0986 6.74951 12C6.74951 11.9014 6.76894 11.8038 6.80668 11.7128C6.84443 11.6217 6.89974 11.539 6.96948 11.4694L14.4695 3.96937C14.6102 3.82864 14.8011 3.74958 15.0001 3.74958C15.1991 3.74958 15.39 3.82864 15.5307 3.96937C15.6715 4.1101 15.7505 4.30097 15.7505 4.5C15.7505 4.69902 15.6715 4.88989 15.5307 5.03062L8.56041 12L15.5307 18.9694Z" fill="currentColor"/>
        </svg>
      </a>
    </header>

    <form class="release-reflection-form" data-release-form>
      <section class="release-copy" aria-labelledby="release-title">
        <h1 id="release-title">You did it! You're letting go.</h1>
        <p>How did you manage to feel lighter?</p>
      </section>

      <label class="release-journal-field" for="release-reflection">
        <span class="sr-only">Share your strategy</span>
        <textarea id="release-reflection" name="reflection" placeholder="Share your strategy..." data-release-textarea></textarea>
      </label>

      <button class="glass-chip release-done-button" type="submit" disabled data-release-done>Done</button>
    </form>
  </main>

  <script type="module" src="../views/releaseReflectionView.js"></script>
</body>
</html>
